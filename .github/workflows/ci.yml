name: ci
on:
  push: {}
  pull_request: {}

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Lint
        run: pipx run ruff check .
      - name: Solver (the LP engine's only dependency)
        run: python3 -m pip install highspy==1.15.1
      - name: Bake from the committed archive
        run: python3 pipeline/build_data.py
      - name: Data pins + banned-framing gate
        run: |
          python3 tests/test_data.py
          python3 tests/test_lp_parity.py
          python3 tests/test_engine_sync.py
          python3 tests/qa_gate.py
          python3 scripts/verify_claims.py
      - name: Behavioral checks against a local server
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q zsh
          (cd web && python3 serve.py 8789 &)
          sleep 2
          zsh tests/e2e.sh http://localhost:8789

  studio:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install (the HiGHS wasm build ships via npm)
        run: npm ci
      - name: Baked data + wasm into public/
        run: node scripts/copy-data.mjs
      - name: Types, lint, format
        run: |
          npm run typecheck
          npm run lint
          npm run format:check
      - name: Parity suite (LP text hashes + golden outputs through the wasm solver)
        run: npm test -- --run
      - name: Production build
        run: npm run build -- --base=/studio/
