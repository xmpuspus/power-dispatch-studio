name: archive-iemop
on:
  schedule:
    - cron: "45 22 * * *"   # 06:45 PHT daily, after IEMOP posts the prior day
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: archive-iemop
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Solver (the LP engine's only dependency)
        run: python3 -m pip install highspy==1.15.1
      - name: Fetch everything newer than the archive
        id: fetch
        # continue so a partial IEMOP failure still commits what DID arrive;
        # the explicit red steps at the end keep the failure visible.
        continue-on-error: true
        run: python3 pipeline/archive_iemop.py --daily
      - name: Derive DIPCEF dailies (per-resource energy; zips too heavy to keep)
        id: derive
        continue-on-error: true
        run: python3 pipeline/fuelmix.py --derive --limit 3
      - name: Derive nodal-price dailies (per-node LMP deviations; same zips)
        id: derive_nodal
        continue-on-error: true
        run: python3 pipeline/nodal_prices.py --derive --limit 3
      - name: Recompute the loss-surface validation over the clean days
        id: derive_loss_surface
        continue-on-error: true
        run: python3 pipeline/loss_surface.py
      - name: Derive offer-stack dailies (RTDOE + RTDNE; hourly files too heavy to keep)
        id: derive_offers
        continue-on-error: true
        run: python3 pipeline/offers.py --derive --limit 3
      - name: Preserve the newest full 5-minute RTDOE book (window erases it daily)
        id: derive_rtdoe5
        continue-on-error: true
        run: python3 pipeline/archive_rtdoe.py --latest 1
      - name: Derive reserve-book dailies (RTDOR; hourly files too heavy to keep)
        id: derive_reserve
        continue-on-error: true
        run: python3 pipeline/reserve_offers.py --derive --limit 3
      - name: Derive DIPCRF reserve results (per-resource cleared reserve; zips too heavy to keep)
        id: derive_reserve_results
        continue-on-error: true
        run: python3 pipeline/reserve_results.py --derive --limit 3
      - name: Re-measure the administered-dispatch overlay over the rolling window
        id: derive_admin
        continue-on-error: true
        run: python3 pipeline/admin_dispatch.py --derive
      - name: Re-measure the sub-hourly negative-price probe over the rolling window
        id: derive_subhourly
        continue-on-error: true
        run: python3 pipeline/subhourly_probe.py --derive
      - name: Commit raw + derived files first (the archive is the irreplaceable asset)
        run: |
          git config user.name "archive-bot"
          git config user.email "archive@localhost"
          git add data/raw data/derived
          git diff --cached --quiet && echo "no new raw files" || {
            git commit -m "archive: $(date -u +%Y-%m-%d)"
            git push
          }
      - name: Rebake web data from the archive
        run: python3 pipeline/build_data.py
      - name: Resync the pip package's bundled data snapshot to the fresh bake
        # the window rolls forward nightly, so src/power_dispatch/data drifts from
        # the bake exactly like the prose does. Without this, the package-vs-pipeline
        # parity gate stays green here (the bake push runs under the Actions token
        # and never triggers ci.yml) and only trips on the next human push. Mirror
        # the data step of `make package` (no wheel build; PyPI release is separate).
        run: |
          cp web/data/dispatch.json web/data/profiles.json web/data/meta.json src/power_dispatch/data/
          cp data/derived/offer_daily/OFFERD_*.json src/power_dispatch/data/offers/
      - name: Sync the public prose to the fresh bake
        # the window rolls a day forward every night; keep every rolling count in
        # README, studio/README, and methodology in lockstep with the map (incl.
        # the reserve-validation table, regenerated from the baked pools) instead
        # of letting the prose freeze.
        run: python3 scripts/verify_claims.py --write
      - name: Data pins + banned-framing gate
        run: |
          python3 tests/test_data.py
          python3 tests/test_lp_parity.py
          python3 tests/test_engine_sync.py
          python3 tests/qa_gate.py
      - name: Commit rebaked web data
        run: |
          git add web/data src/power_dispatch/data README.md studio/README.md web/methodology.html
          git diff --cached --quiet && echo "bake unchanged" || {
            git commit -m "bake: $(date -u +%Y-%m-%d)"
            git push
          }
      - name: Fail red if the fetch failed
        if: steps.fetch.outcome == 'failure'
        run: exit 1
      - name: Fail red if the nodal derivers failed (the map and studio read them)
        # these run continue-on-error so a partial IEMOP outage still commits
        # what arrived, but a silent nodal-deriver failure must not pass green
        if: steps.derive_nodal.outcome == 'failure' || steps.derive_loss_surface.outcome == 'failure'
        run: exit 1
      - name: Staleness gate (red when the archive stops growing)
        run: python3 pipeline/archive_iemop.py --check
