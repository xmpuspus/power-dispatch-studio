name: archive-iemop
on:
  schedule:
    - cron: "45 22 * * *"   # 06:45 PHT daily, after IEMOP posts the prior day
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: archive-iemop
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Solver (the LP engine's only dependency)
        run: python3 -m pip install highspy
      - name: Fetch everything newer than the archive
        id: fetch
        # continue so a partial IEMOP failure still commits what DID arrive;
        # the explicit red steps at the end keep the failure visible.
        continue-on-error: true
        run: python3 pipeline/archive_iemop.py --daily
      - name: Derive DIPCEF dailies (per-resource energy; zips too heavy to keep)
        id: derive
        continue-on-error: true
        run: python3 pipeline/fuelmix.py --derive --limit 3
      - name: Derive offer-stack dailies (RTDOE + RTDNE; hourly files too heavy to keep)
        id: derive_offers
        continue-on-error: true
        run: python3 pipeline/offers.py --derive --limit 3
      - name: Derive reserve-book dailies (RTDOR; hourly files too heavy to keep)
        id: derive_reserve
        continue-on-error: true
        run: python3 pipeline/reserve_offers.py --derive --limit 3
      - name: Derive DIPCRF reserve results (per-resource cleared reserve; zips too heavy to keep)
        id: derive_reserve_results
        continue-on-error: true
        run: python3 pipeline/reserve_results.py --derive --limit 3
      - name: Re-measure the administered-dispatch overlay over the rolling window
        id: derive_admin
        continue-on-error: true
        run: python3 pipeline/admin_dispatch.py --derive
      - name: Re-measure the sub-hourly negative-price probe over the rolling window
        id: derive_subhourly
        continue-on-error: true
        run: python3 pipeline/subhourly_probe.py --derive
      - name: Commit raw + derived files first (the archive is the irreplaceable asset)
        run: |
          git config user.name "archive-bot"
          git config user.email "archive@localhost"
          git add data/raw data/derived
          git diff --cached --quiet && echo "no new raw files" || {
            git commit -m "archive: $(date -u +%Y-%m-%d)"
            git push
          }
      - name: Rebake web data from the archive
        run: python3 pipeline/build_data.py
      - name: Sync the README numbers to the fresh bake
        # the window rolls a day forward every night; keep the README's rolling
        # counts in lockstep with the map instead of letting the prose freeze.
        run: python3 scripts/verify_claims.py --write
      - name: Data pins + banned-framing gate
        run: |
          python3 tests/test_data.py
          python3 tests/test_lp_parity.py
          python3 tests/qa_gate.py
      - name: Commit rebaked web data
        run: |
          git add web/data README.md
          git diff --cached --quiet && echo "bake unchanged" || {
            git commit -m "bake: $(date -u +%Y-%m-%d)"
            git push
          }
      - name: Fail red if the fetch failed
        if: steps.fetch.outcome == 'failure'
        run: exit 1
      - name: Staleness gate (red when the archive stops growing)
        run: python3 pipeline/archive_iemop.py --check
